<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator — Golden Hour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="deco-grid" aria-hidden="true">
  <div class="diamond"></div>
  <div class="diamond"></div>
  <div class="diamond"></div>
  <div class="diamond"></div>
  <div class="diamond"></div>
  <div class="line"></div>
  <div class="line"></div>
</div>

<main class="calculator" role="form" aria-label="BMI Calculator">

  <div class="header">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 3C7.03 3 3 7.03 3 12s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7 7 3.14 7 7-3.14 7-7 7zm-1-11h2v4h-2zm0 6h2v2h-2z"/></svg>
    </div>
    <h1>BMI Calculator</h1>
    <p>Know your Body Mass Index</p>
  </div>

  <div class="unit-toggle" role="tablist" aria-label="Unit system">
    <button role="tab" aria-selected="true" class="active" data-unit="imperial" id="tab-imperial">Imperial</button>
    <button role="tab" aria-selected="false" data-unit="metric" id="tab-metric">Metric</button>
  </div>

  <!-- Imperial fields -->
  <div class="fields" id="fields-imperial">
    <div class="field-group">
      <label for="feet">Height</label>
      <div class="input-row">
        <div class="input-wrap">
          <input type="number" id="feet" placeholder="5" min="1" max="8" aria-label="Feet">
          <span class="suffix">ft</span>
        </div>
        <div class="input-wrap">
          <input type="number" id="inches" placeholder="9" min="0" max="11" aria-label="Inches">
          <span class="suffix">in</span>
        </div>
      </div>
    </div>
    <div class="field-group">
      <label for="lbs">Weight</label>
      <div class="input-row">
        <div class="input-wrap">
          <input type="number" id="lbs" placeholder="160" min="1" max="1000" aria-label="Pounds">
          <span class="suffix">lbs</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Metric fields -->
  <div class="fields" id="fields-metric" style="display:none;">
    <div class="field-group">
      <label for="cm">Height</label>
      <div class="input-row">
        <div class="input-wrap">
          <input type="number" id="cm" placeholder="175" min="50" max="272" aria-label="Centimeters">
          <span class="suffix">cm</span>
        </div>
      </div>
    </div>
    <div class="field-group">
      <label for="kg">Weight</label>
      <div class="input-row">
        <div class="input-wrap">
          <input type="number" id="kg" placeholder="72" min="1" max="500" aria-label="Kilograms">
          <span class="suffix">kg</span>
        </div>
      </div>
    </div>
  </div>

  <button class="calc-btn" id="calculate" type="button">Calculate BMI</button>

  <div class="result" id="result">
    <div class="result-inner">
      <div class="bmi-value" id="bmi-value">—</div>
      <div class="bmi-label">Body Mass Index</div>
      <div class="category" id="category">
        <span class="dot"></span>
        <span id="category-text"></span>
      </div>
      <div class="scale">
        <div class="scale-bar">
          <div class="scale-marker" id="scale-marker"></div>
        </div>
        <div class="scale-labels">
          <span>15</span>
          <span>18.5</span>
          <span>25</span>
          <span>30</span>
          <span>40</span>
        </div>
      </div>
      <p class="info-text">BMI is a screening tool, not a diagnostic measure.</p>
    </div>
  </div>
</main>

<script src="calculator.js"></script>
</body>
</html>
